<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ShuttleStats Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=M+PLUS+1p:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--s0:#0b0e18;--s1:#10151f;--s2:#171d2c;--s3:#1e2738;
  --bd:#1d2d47;--bd2:#253650;
  --acc:#00dfff;--acc2:rgba(0,223,255,.12);
  --gold:#ffc843;
  --win:#00e87a;--wind:rgba(0,232,122,.1);
  --lose:#ff3d5a;--losed:rgba(255,61,90,.1);
  --pa:#4da6ff;--pb:#ff6eb4;--pc:#3de0b3;--pd:#ff9f43;
  --r:10px;--rs:6px;--hdr:50px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'M PLUS 1p',sans-serif;background:var(--bg);color:#e2e8f0;display:flex;flex-direction:column;}

/* ─── HEADER ─── */
#hdr{height:var(--hdr);flex-shrink:0;background:var(--s0);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;padding:0 14px;position:relative;z-index:50;}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.35;}
.logo{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(120deg,var(--acc),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.gpill{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:4px 12px;
  font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gpill .dot{width:6px;height:6px;border-radius:50%;background:var(--win);flex-shrink:0;}
#hnav{display:flex;gap:2px;margin-left:auto;}
.hn{background:transparent;border:none;color:#64748b;padding:6px 10px;border-radius:var(--rs);
  font-family:inherit;font-size:11px;cursor:pointer;transition:all .18s;font-weight:700;}
.hn.active,.hn:hover{color:var(--acc);}
.hn.active{background:var(--acc2);}

/* ─── MAIN ─── */
#main{flex:1;display:flex;overflow:hidden;}

/* ─── SIDEBAR ─── */
#sb{width:192px;flex-shrink:0;background:var(--s0);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-sec{padding:10px 12px;border-bottom:1px solid var(--bd);}
.sb-lbl{font-size:9px;letter-spacing:3px;color:#475569;margin-bottom:7px;font-weight:700;}
.pc{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;transition:background .15s;}
.pc:hover{background:var(--s2);}
.pcd{width:9px;height:9px;border-radius:50%;}
.pcn{font-size:12px;flex:1;font-weight:500;}
.pce{background:transparent;border:none;color:#475569;cursor:pointer;font-size:12px;padding:2px 4px;transition:color .15s;}
.pce:hover{color:var(--acc);}
#sb-gl{flex:1;overflow-y:auto;padding:6px;}
.gi{padding:8px 10px;border-radius:var(--rs);cursor:pointer;transition:all .15s;margin-bottom:3px;border:1px solid transparent;position:relative;}
.gi:hover{background:var(--s2);}
.gi:hover .gi-del{display:flex;}
.gi.ag{background:var(--acc2);border-color:var(--acc);}
.gi-nm{font-size:12px;font-weight:700;margin-bottom:2px;padding-right:20px;}
.gi-dt{font-size:10px;color:#475569;}
.gi-sc{font-size:10px;margin-top:3px;display:flex;gap:5px;}
.gi-del{display:none;position:absolute;top:6px;right:6px;background:transparent;border:none;
  color:#475569;cursor:pointer;font-size:13px;width:20px;height:20px;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;}
.gi-del:hover{color:var(--lose);background:var(--losed);}
.btn-ng{margin:8px;background:linear-gradient(135deg,var(--acc),#0095b0);color:#000;border:none;
  border-radius:var(--rs);padding:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;
  width:calc(100% - 16px);}
.btn-ng:hover{filter:brightness(1.1);}

/* ─── PAGES ─── */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.act{display:flex;}

/* ══ INPUT PAGE ══ */
#page-input{flex-direction:column;}
#prog{flex-shrink:0;background:var(--s0);border-bottom:1px solid var(--bd);padding:9px 14px;display:flex;gap:5px;align-items:center;}
.ps{display:flex;align-items:center;gap:4px;font-size:10px;color:#475569;font-weight:700;transition:color .2s;}
.ps.done{color:var(--win);}.ps.active{color:var(--acc);}
.ps .pn{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:10px;background:transparent;transition:all .2s;}
.ps.done .pn{background:var(--win);border-color:var(--win);color:#000;}
.ps.active .pn{background:var(--acc);border-color:var(--acc);color:#000;}
.parr{color:#1d2d47;font-size:13px;flex-shrink:0;}
#pw{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* Phase 1 */
#ph1{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ph1s{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
.ptitle{font-size:11px;font-weight:800;color:var(--acc);letter-spacing:2px;margin-bottom:3px;}
.phint{font-size:10px;color:#475569;margin-bottom:7px;}
.rrow{display:flex;gap:8px;}
.rb{flex:1;padding:11px 4px;border-radius:var(--rs);border:2px solid;background:transparent;
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:5px;}
.rb.win{border-color:var(--win);color:var(--win);}
.rb.win.sel{background:var(--win);color:#000;}
.rb.lose{border-color:var(--lose);color:var(--lose);}
.rb.lose.sel{background:var(--lose);color:#fff;}
.ph1f{flex-shrink:0;padding:10px 12px;border-top:1px solid var(--bd);background:var(--s0);}
.btnfull{width:100%;padding:12px;border-radius:var(--rs);border:none;font-family:inherit;
  font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;}
.btnpri{background:linear-gradient(135deg,var(--acc),#0095b0);color:#000;}
.btnpri:hover{filter:brightness(1.12);}
.btnpri:disabled{opacity:.35;cursor:not-allowed;filter:none;}

/* Phase 2 */
#ph2{flex:1;display:none;overflow:hidden;flex-direction:row;}
.ph2l{width:50%;max-width:310px;flex-shrink:0;display:flex;flex-direction:column;
  overflow:hidden;border-right:1px solid var(--bd);background:var(--s1);}
.carea{flex:1;min-height:0;padding:7px;display:flex;flex-direction:column;gap:5px;}
.ctopbar{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ctopbar .clbl{font-size:9px;letter-spacing:2px;color:#475569;font-weight:700;}
.ctr{margin-left:auto;font-size:10px;color:#475569;}
.csvg-wrap{flex:1;min-height:0;position:relative;}
.csvg-wrap svg{width:100%;height:100%;cursor:crosshair;display:block;}
.sqstrip{flex-shrink:0;border-top:1px solid var(--bd);padding:5px 8px;background:var(--s1);
  display:flex;gap:3px;align-items:center;overflow-x:auto;min-height:38px;}
.sqc{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:2px 8px;
  font-size:10px;display:flex;align-items:center;gap:3px;flex-shrink:0;white-space:nowrap;}
.sqc.fin{border-color:var(--gold);color:var(--gold);}
.sqa{color:#475569;font-size:10px;flex-shrink:0;}
.ph2r{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--s0);}
.slist{flex:1;overflow-y:auto;padding:7px;}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:border-color .15s;}
.sc.cur{border-color:var(--acc);}
.schdr{padding:7px 10px;display:flex;align-items:center;gap:6px;background:var(--s1);border-bottom:1px solid var(--bd);cursor:pointer;}
.snum{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;background:var(--s3);color:#64748b;border:1px solid var(--bd2);}
.snum.cur{background:var(--acc);color:#000;border-color:var(--acc);}
.snum.done{background:var(--win);color:#000;border-color:var(--win);}
.stitle{font-size:11px;font-weight:700;flex:1;}
.sdel{background:transparent;border:none;color:#475569;cursor:pointer;font-size:12px;padding:2px 4px;transition:color .15s;}
.sdel:hover{color:var(--lose);}
.sbody{padding:7px 10px;}
.fl{font-size:9px;color:#475569;letter-spacing:2px;margin-bottom:4px;font-weight:700;}
.shr-row{display:flex;gap:3px;margin-bottom:7px;}
.shr{flex:1;padding:6px 2px;border-radius:var(--rs);border:1.5px solid var(--bd2);
  background:transparent;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.shr.sel{color:#000;}
.strow{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px;}
.stb{padding:4px 6px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--s1);
  color:#64748b;font-family:inherit;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.stb:hover{border-color:var(--acc);color:var(--acc);}
.stb.sel{background:var(--acc2);border-color:var(--acc);color:var(--acc);font-weight:700;}
.lhint{font-size:10px;padding:4px 7px;border-radius:var(--rs);border:1px dashed var(--bd);color:#475569;}
.lhint.ok{border-color:var(--win);color:var(--win);}
.phint2{font-size:10px;padding:4px 7px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd);color:#94a3b8;margin-bottom:5px;}
.ph2f{flex-shrink:0;padding:8px 10px;border-top:1px solid var(--bd);background:var(--s0);display:flex;gap:5px;}
.bsm{padding:8px 11px;border-radius:var(--rs);border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.bbk{background:var(--s2);border:1px solid var(--bd);color:#64748b;}
.bbk:hover{color:var(--lose);border-color:var(--lose);}
.badd{background:rgba(0,223,255,.08);border:1px dashed rgba(0,223,255,.3);color:var(--acc);flex:1;}
.badd:hover{background:rgba(0,223,255,.15);}
.badd:disabled{opacity:.3;cursor:not-allowed;}
.bsave{background:linear-gradient(135deg,var(--win),#00b05a);color:#000;flex:1;}
.bsave:hover{filter:brightness(1.1);}
.bsave:disabled{opacity:.35;cursor:not-allowed;filter:none;}

/* ══ STATS PAGE ══ */
#page-stats{overflow:hidden;}
.sfbar{flex-shrink:0;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--s0);
  display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.sfb{background:var(--s2);border:1px solid var(--bd);color:#64748b;padding:4px 10px;border-radius:13px;
  font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;font-weight:700;}
.sfb.active{background:var(--acc2);color:var(--acc);border-color:var(--acc);}
.stbody{flex:1;overflow-y:auto;padding:12px;}
.scards{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px;}
.scard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px 11px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.scard.ct::before{background:var(--acc);}.scard.cr::before{background:var(--gold);}
.scard.cw::before{background:var(--win);}.scard.cl::before{background:var(--lose);}
.scard .val{font-family:'Orbitron',monospace;font-size:26px;font-weight:700;line-height:1;margin-bottom:3px;}
.scard.ct .val{color:var(--acc);}.scard.cr .val{color:var(--gold);}
.scard.cw .val{color:var(--win);}.scard.cl .val{color:var(--lose);}
.scard .lbl{font-size:9px;color:#475569;letter-spacing:2px;}
.sect{font-size:10px;letter-spacing:4px;color:var(--acc);margin-bottom:10px;font-weight:700;
  display:flex;align-items:center;gap:6px;}
.sect::before{content:'';width:3px;height:11px;background:var(--acc);border-radius:2px;}
.psgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.pscard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;}
.psctop{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.psdot{width:9px;height:9px;border-radius:50%;}
.psnm{font-size:13px;font-weight:700;flex:1;}
.psrate{font-size:11px;font-weight:700;}
.psrow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--bd);}
.psrow:last-child{border-bottom:none;}
.psrl{font-size:10px;flex:2;display:flex;align-items:center;gap:4px;}
.psrn{display:flex;gap:5px;flex:1;justify-content:flex-end;}
.psw{color:var(--win);font-size:11px;font-weight:700;min-width:18px;text-align:right;}
.psl{color:var(--lose);font-size:11px;font-weight:700;min-width:18px;text-align:right;}
.psbar{flex:2;height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.psfill{height:100%;border-radius:2px;}
.sttable{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.stth{display:grid;grid-template-columns:2fr 1fr 1fr 2fr 1fr;padding:7px 12px;background:var(--s2);border-bottom:1px solid var(--bd);}
.stth span{font-size:9px;color:#475569;letter-spacing:2px;font-weight:700;text-align:center;}
.stth span:first-child{text-align:left;}
.sttr{display:grid;grid-template-columns:2fr 1fr 1fr 2fr 1fr;padding:8px 12px;border-bottom:1px solid var(--bd);align-items:center;transition:background .12s;}
.sttr:last-child{border-bottom:none;}
.sttr:hover{background:var(--s2);}
.trnm{font-size:11px;display:flex;align-items:center;gap:5px;}
.trn{font-size:11px;font-weight:700;text-align:center;}
.trn.g{color:var(--win);}.trn.r{color:var(--lose);}
.trbar .trpct{font-size:9px;color:#94a3b8;margin-bottom:2px;}
.trb{height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.trf{height:100%;border-radius:2px;}

/* ══ LOG PAGE ══ */
#page-log{overflow:hidden;}
.lfbar{flex-shrink:0;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--s0);
  display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.lfs{background:var(--s2);border:1px solid var(--bd);color:#e2e8f0;padding:5px 8px;border-radius:var(--rs);font-family:inherit;font-size:11px;}
.lbody{flex:1;overflow-y:auto;padding:10px;}
.rc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;
  margin-bottom:7px;display:flex;align-items:flex-start;gap:8px;transition:border-color .15s;}
.rc:hover{border-color:var(--bd2);}
.rcbadge{width:31px;height:31px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.rcbadge.win{background:var(--wind);color:var(--win);border:1.5px solid var(--win);}
.rcbadge.lose{background:var(--losed);color:var(--lose);border:1.5px solid var(--lose);}
.rcbody{flex:1;min-width:0;}
.rctop{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;align-items:center;}
.rcshots{display:flex;flex-wrap:wrap;gap:3px;align-items:center;margin-bottom:4px;}
.rcs{background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:2px 6px;font-size:10px;white-space:nowrap;}
.rcs.fin{border-color:var(--gold);color:var(--gold);}
.rca{color:#475569;font-size:9px;}
.rcmeta{font-size:10px;color:#475569;}
.rcbtns{display:flex;gap:4px;flex-shrink:0;flex-direction:column;}
.rcbtn{background:transparent;border:1px solid var(--bd);color:#475569;border-radius:var(--rs);padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;}
.rcbtn.play{border-color:var(--acc);color:var(--acc);}
.rcbtn.play:hover{background:var(--acc2);}
.rcbtn.edit{border-color:var(--gold);color:var(--gold);}
.rcbtn.edit:hover{background:rgba(255,200,67,.1);}
.rcbtn.del:hover{border-color:var(--lose);color:var(--lose);background:var(--losed);}

/* ══ REPLAY MODAL ══ */
#modal-replay{display:none;position:fixed;inset:0;z-index:300;background:rgba(4,6,12,.96);
  backdrop-filter:blur(10px);flex-direction:column;align-items:stretch;}
#modal-replay.open{display:flex;}
.rphdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:1px solid var(--bd);background:var(--s0);position:relative;}
.rphdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.4;}
.rptitle{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;
  background:linear-gradient(120deg,var(--acc),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;}
.rpbadge{padding:3px 9px;border-radius:13px;font-size:11px;font-weight:700;flex-shrink:0;}
.rpbadge.win{background:var(--wind);color:var(--win);border:1px solid var(--win);}
.rpbadge.lose{background:var(--losed);color:var(--lose);border:1px solid var(--lose);}
.rpclose{margin-left:auto;background:var(--s2);border:1px solid var(--bd);color:#94a3b8;
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rpclose:hover{background:var(--lose);color:#fff;border-color:var(--lose);}
.rpbody{flex:1;display:flex;overflow:hidden;min-height:0;}
.rpcourt{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:8px;}
.rpcsvg-box{width:100%;max-width:320px;}
#rpc{width:100%;display:block;}
.rpstatus{text-align:center;font-size:10px;color:#475569;min-height:14px;letter-spacing:1px;}
.rpprog{height:3px;background:var(--s2);border-radius:2px;width:100%;max-width:320px;overflow:hidden;}
.rppfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:2px;transition:width .1s linear;width:0%;}
.rppanel{width:230px;flex-shrink:0;display:flex;flex-direction:column;background:var(--s0);border-left:1px solid var(--bd);overflow:hidden;}
.rptl{flex:1;overflow-y:auto;padding:8px;}
.rpti{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--rs);margin-bottom:3px;border:1px solid transparent;transition:all .2s;cursor:pointer;}
.rpti:hover{background:var(--s2);}
.rpti.active{background:var(--acc2);border-color:var(--acc);}
.rpti.played{opacity:.4;}
.rptinum{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;background:var(--s3);color:#64748b;}
.rptinum.active{background:var(--acc);color:#000;}
.rptinum.played{background:var(--s2);}
.rptiinfo{flex:1;min-width:0;}
.rptiplayer{font-size:11px;font-weight:700;}
.rptitype{font-size:10px;color:#64748b;}
.rptizone{font-size:9px;color:#475569;margin-top:1px;}
.rpctrl{flex-shrink:0;padding:9px 11px;border-top:1px solid var(--bd);background:var(--s1);}
.rpsrow{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.rpslbl{font-size:9px;color:#475569;letter-spacing:2px;white-space:nowrap;}
.rpspd-btns{display:flex;gap:4px;}
.rpspd{background:var(--s2);border:1px solid var(--bd);color:#64748b;padding:4px 8px;border-radius:var(--rs);font-family:inherit;font-size:11px;cursor:pointer;font-weight:700;transition:all .15s;}
.rpspd.active{background:var(--acc2);color:var(--acc);border-color:var(--acc);}
.rpbrow{display:flex;gap:5px;}
.rpbtn{flex:1;padding:8px;border-radius:var(--rs);border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.rpplay{background:linear-gradient(135deg,var(--acc),#0095b0);color:#000;}
.rpplay:hover{filter:brightness(1.12);}
.rpprev,.rpnext{background:var(--s2);border:1px solid var(--bd);color:#94a3b8;flex:0;padding:8px 11px;}
.rpprev:hover,.rpnext:hover{border-color:var(--acc);color:var(--acc);}
.rpreset{background:var(--s2);border:1px solid var(--bd);color:#64748b;flex:0;padding:8px 10px;}
.rpreset:hover{border-color:var(--lose);color:var(--lose);}

/* ══ MODALS ══ */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  z-index:200;align-items:center;justify-content:center;padding:16px;}
.mov.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;width:100%;max-width:330px;animation:mIn .22s ease;}
@keyframes mIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.mt{font-family:'Orbitron',monospace;font-size:13px;color:var(--acc);letter-spacing:2px;margin-bottom:14px;}
.mf{margin-bottom:11px;}
.mf label{display:block;font-size:9px;color:#475569;letter-spacing:2px;margin-bottom:4px;font-weight:700;}
.mf input,.mf select{width:100%;background:var(--s2);border:1px solid var(--bd);color:#e2e8f0;
  padding:8px 10px;border-radius:var(--rs);font-family:inherit;font-size:12px;outline:none;}
.mf input:focus,.mf select:focus{border-color:var(--acc);}
.mbtns{display:flex;gap:7px;margin-top:14px;}
.mbc{flex:1;padding:9px;background:var(--s2);border:1px solid var(--bd);color:#64748b;border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:11px;}
.mbok{flex:2;padding:9px;background:linear-gradient(135deg,var(--acc),#0095b0);color:#000;border:none;border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;}
.mbdel{flex:1;padding:9px;background:var(--losed);border:1px solid var(--lose);color:var(--lose);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;}
.tsel{display:flex;gap:5px;flex-wrap:wrap;}
.tsb{padding:7px 10px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--s2);color:#64748b;font-family:inherit;font-size:11px;cursor:pointer;font-weight:700;transition:all .15s;}

/* Confirm modal */
#modal-confirm .modal{max-width:280px;}
.confirm-msg{font-size:13px;color:#94a3b8;margin-bottom:6px;line-height:1.5;}
.confirm-sub{font-size:11px;color:#475569;}

/* TOAST */
.toast{position:fixed;bottom:16px;right:12px;z-index:500;background:var(--s2);border:1px solid var(--bd);
  padding:9px 14px;border-radius:var(--rs);font-size:12px;font-weight:700;
  transform:translateY(60px);opacity:0;transition:all .28s;pointer-events:none;max-width:250px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.tok{border-color:var(--win);color:var(--win);}
.toast.terr{border-color:var(--lose);color:var(--lose);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#475569;}
.empty .ei{font-size:36px;margin-bottom:9px;}

/* Responsive */
@media(max-width:600px){
  #sb{display:none;}
  .scards{grid-template-columns:repeat(2,1fr);}
  .psgrid{grid-template-columns:1fr;}
  #ph2{flex-direction:column;}
  .ph2l{width:100%;max-width:100%;border-right:none;border-bottom:1px solid var(--bd);flex:0 0 auto;height:50vw;min-height:180px;}
  .rppanel{width:100%;border-left:none;border-top:1px solid var(--bd);max-height:200px;}
  .rpbody{flex-direction:column;}
  .rptl{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:6px;}
  .rpti{flex-direction:column;align-items:center;text-align:center;min-width:60px;padding:5px 3px;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
</style>
</head>

<script>
// ════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════
const PK=['A','B','C','D'];
const PC={A:'#4da6ff',B:'#ff6eb4',C:'#3de0b3',D:'#ff9f43'};
const SHOTS=[
  {id:'smash',l:'スマッシュ',i:'⚡'},{id:'clear',l:'クリア',i:'🌙'},
  {id:'drop',l:'ドロップ',i:'🍂'},{id:'net',l:'ネット',i:'🕸️'},
  {id:'drive',l:'ドライブ',i:'💨'},{id:'serve',l:'サーブ',i:'🎯'},
  {id:'push',l:'プッシュ',i:'👊'},{id:'hair',l:'ヘアピン',i:'📌'},
  {id:'lob',l:'ロブ',i:'🔺'},
];
const MAX_S=6;
const SW=300,SH=460;
const mkS=t=>document.createElementNS('http://www.w3.org/2000/svg',t);
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));

// ════════════════════════════════════════
// DB
// ════════════════════════════════════════
let db=loadDB();
function loadDB(){
  try{const d=localStorage.getItem('ss_v5');if(d)return JSON.parse(d);}catch(e){}
  return{players:{A:'選手A',B:'選手B',C:'選手C',D:'選手D'},games:[],activeGame:null};
}
function saveDB(){localStorage.setItem('ss_v5',JSON.stringify(db));}
function aGame(){return db.games.find(g=>g.id===db.activeGame)||null;}

// ════════════════════════════════════════
// INPUT STATE
// ════════════════════════════════════════
// Each slot: {player, shotId, positions:{A:{x,y},...}, landX, landY}
// positions = all 4 players' positions AT the moment of this shot
let ph1s={
  result:null,
  initPos:{A:{x:85,y:315},B:{x:215,y:315},C:{x:85,y:155},D:{x:215,y:155}},
  drag:null,
};
let slots=[];
let curSlot=0;
let dragT=null;
let ngTeam=new Set(['A','B']);
let sfGame='all',sfPl='all';
// Edit rally state
let editRallyRef=null; // {gId,rId}
let erResult=null;

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.onload=()=>{
  document.getElementById('mg-date').value=new Date().toISOString().split('T')[0];
  initSlots();
  renderSB();
  renderFmCourt();
  renderFmLegend();
  initFmDrag();
  initPlayCourtEv();
  renderShotList();
  renderPlayCourt();
  updProg(1);
  updPill();
  if(!db.games.length)openGameModal();
};
function initSlots(){slots=[newSlot()];curSlot=0;}
function newSlot(){
  const prev=slots.length?JSON.parse(JSON.stringify(slots[slots.length-1].positions))
    :JSON.parse(JSON.stringify(ph1s.initPos));
  return{player:null,shotId:null,positions:prev,landX:null,landY:null};
}

// ════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════
function renderSB(){
  document.getElementById('pllist').innerHTML=PK.map(k=>`
    <div class="pc">
      <div class="pcd" style="background:${PC[k]}"></div>
      <div class="pcn">${db.players[k]}</div>
      <button class="pce" onclick="editPl('${k}')">✎</button>
    </div>`).join('');
  const gl=document.getElementById('sb-gl');
  if(!db.games.length){gl.innerHTML='';return;}
  gl.innerHTML=`<div class="sb-lbl" style="padding:8px 12px 3px">ゲーム</div>`+
    [...db.games].reverse().map(g=>{
      const w=(g.rallies||[]).filter(r=>r.result==='win').length;
      const l=(g.rallies||[]).filter(r=>r.result==='lose').length;
      return`<div class="gi ${db.activeGame===g.id?'ag':''}" onclick="selGame('${g.id}')">
        <div class="gi-nm">${g.name}</div>
        <div class="gi-dt">${g.date||''} ${g.opponent?'vs '+g.opponent:''}</div>
        <div class="gi-sc">
          <span style="color:var(--win)">得${w}</span>
          <span style="color:var(--lose)">失${l}</span>
          <span style="color:#475569">(${(g.rallies||[]).length})</span>
        </div>
        <button class="gi-del" onclick="confirmDelGame(event,'${g.id}','${g.name}')">✕</button>
      </div>`;
    }).join('');
  rebuildMGTeam();rebuildPFBtns();updPill();
}
function updPill(){

// ════════════════════════════════════════
// PLAY COURT DRAW
// ════════════════════════════════════════
function drawTok(parent,k,x,y,r,large,slotIdx){
  const grp=mkS('g');grp.setAttribute('data-pk',k);
  if(slotIdx!==undefined)grp.setAttribute('data-slot',slotIdx);
  grp.style.cursor='grab';
  const c=mkS('circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);
  c.setAttribute('fill',PC[k]);c.setAttribute('opacity','0.9');grp.appendChild(c);
  const rim=mkS('circle');rim.setAttribute('cx',x);rim.setAttribute('cy',y);rim.setAttribute('r',r);
  rim.setAttribute('fill','none');rim.setAttribute('stroke','rgba(255,255,255,0.4)');rim.setAttribute('stroke-width','1.5');grp.appendChild(rim);
  const t=mkS('text');t.setAttribute('x',x);t.setAttribute('y',y+1);
  t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
  t.setAttribute('font-size',large?'10':'8');t.setAttribute('fill','#000');
  t.setAttribute('font-family',"'M PLUS 1p',sans-serif");t.setAttribute('font-weight','800');
  t.textContent=(db.players[k]||k).slice(0,2);grp.appendChild(t);
  parent.appendChild(grp);
}
function calcCtrl(x1,y1,x2,y2){
  const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len,cv=Math.min(len*0.28,50);
  return{cx:mx+nx*cv,cy:my+ny*cv};
}
function renderPlayCourt(){
  // trajectories
  const tg=document.getElementById('cv-traj');tg.innerHTML='';
  slots.forEach((s,i)=>{
    if(!s.player||s.landX===null)return;
    const col=PC[s.player];
    const pos=s.positions[s.player];
    const {cx,cy}=calcCtrl(pos.x,pos.y,s.landX,s.landY);
    const isLast=i===slots.length-1||slots.slice(i+1).every(x=>!x.player&&x.landX===null);
    const glow=mkS('path');
    glow.setAttribute('d',`M${pos.x},${pos.y} Q${cx},${cy} ${s.landX},${s.landY}`);
    glow.setAttribute('fill','none');glow.setAttribute('stroke',col);
    glow.setAttribute('stroke-width',isLast?'6':'3');glow.setAttribute('stroke-opacity','0.1');
    glow.setAttribute('stroke-linecap','round');tg.appendChild(glow);
    const path=mkS('path');
    path.setAttribute('d',`M${pos.x},${pos.y} Q${cx},${cy} ${s.landX},${s.landY}`);
    path.setAttribute('fill','none');path.setAttribute('stroke',col);
    path.setAttribute('stroke-width',isLast?'2':'1.5');
    path.setAttribute('stroke-opacity',isLast?'1':'0.45');
    path.setAttribute('stroke-dasharray',isLast?'none':'5,3');
    path.setAttribute('stroke-linecap','round');tg.appendChild(path);
    // arrowhead
    const t=0.95;
    const ax=(1-t)*(1-t)*pos.x+2*(1-t)*t*cx+t*t*s.landX;
    const ay=(1-t)*(1-t)*pos.y+2*(1-t)*t*cy+t*t*s.landY;
    const ang=Math.atan2(s.landY-ay,s.landX-ax);const al=7;
    const arr=mkS('polygon');
    arr.setAttribute('points',`${s.landX},${s.landY} ${s.landX-al*Math.cos(ang-0.4)},${s.landY-al*Math.sin(ang-0.4)} ${s.landX-al*Math.cos(ang+0.4)},${s.landY-al*Math.sin(ang+0.4)}`);
    arr.setAttribute('fill',col);arr.setAttribute('opacity',isLast?'1':'0.45');tg.appendChild(arr);
    // shot icon on arc
    const lbl=mkS('text');lbl.setAttribute('x',cx);lbl.setAttribute('y',cy-4);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','9');lbl.setAttribute('fill',col);
    lbl.setAttribute('font-family','sans-serif');lbl.setAttribute('opacity','0.8');
    const sh=SHOTS.find(x=>x.id===s.shotId);lbl.textContent=sh?sh.i:'';tg.appendChild(lbl);
  });
  // landing marks
  const mg=document.getElementById('cv-marks');mg.innerHTML='';
  slots.forEach((s,i)=>{
    if(s.landX===null)return;
    const col=s.player?PC[s.player]:'#94a3b8';
    const isLast=i===slots.length-1||slots.slice(i+1).every(x=>!x.player&&x.landX===null);
    const c=mkS('circle');c.setAttribute('cx',s.landX);c.setAttribute('cy',s.landY);c.setAttribute('r','8');
    c.setAttribute('fill',isLast?col:col+'25');c.setAttribute('stroke',col);c.setAttribute('stroke-width','1.5');
    mg.appendChild(c);
    const t=mkS('text');t.setAttribute('x',s.landX);t.setAttribute('y',s.landY+1);
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','8');t.setAttribute('fill',isLast?'#000':'#fff');
    t.setAttribute('font-family','sans-serif');t.setAttribute('font-weight','700');t.textContent=i+1;mg.appendChild(t);
  });
  // tokens
  const tkg=document.getElementById('cv-tokens');tkg.innerHTML='';
  const pos=slots[curSlot]?.positions||ph1s.initPos;
  PK.forEach(k=>{
    drawTok(tkg,k,pos[k].x,pos[k].y,12,false,curSlot);
  });
  // shooter ring
  const s=slots[curSlot];
  if(s?.player){
    const p=s.positions[s.player];
    const ring=mkS('circle');ring.setAttribute('cx',p.x);ring.setAttribute('cy',p.y);ring.setAttribute('r','18');
    ring.setAttribute('fill','none');ring.setAttribute('stroke',PC[s.player]);ring.setAttribute('stroke-width','1.5');
    ring.setAttribute('opacity','0.5');ring.setAttribute('stroke-dasharray','4,2');
    tkg.insertBefore(ring,tkg.firstChild);
  }
  // counter
  const done=slots.filter(s=>s.player&&s.shotId&&s.landX!==null).length;
  document.getElementById('sctr').textContent=`${done}/${MAX_S}`;
  renderSeqStrip();
}
function renderSeqStrip(){
  const el=document.getElementById('sqstrip');
  const filled=slots.filter(s=>s.player||s.shotId||s.landX!==null);
  if(!filled.length){el.innerHTML=`<span style="font-size:9px;color:#475569;letter-spacing:2px">配球</span>`;return;}
  el.innerHTML=`<span style="font-size:9px;color:#475569;letter-spacing:2px;flex-shrink:0">配球</span>`+
    slots.map((s,i)=>{
      if(!s.player&&!s.shotId&&s.landX===null)return'';
      const sh=s.shotId?SHOTS.find(x=>x.id===s.shotId):null;
      const isLast=i===slots.length-1||slots.slice(i+1).every(x=>!x.player&&!x.shotId&&x.landX===null);
      const col=s.player?PC[s.player]:'#64748b';
      return`${i>0?'<span class="sqa">→</span>':''}
        <div class="sqc ${isLast?'fin':''}" style="border-color:${isLast?'var(--gold)':col+'44'}">
          <span style="width:6px;height:6px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>
          ${sh?sh.i+sh.l:'?'}
        </div>`;
    }).join('');
}

function initPlayCourtEv(){
  const svg=document.getElementById('playcourt');
  const gxy=e=>{const r=svg.getBoundingClientRect();const c=e.touches?e.touches[0]:e;
    return{x:cl((c.clientX-r.left)/r.width*SW,22,278),y:cl((c.clientY-r.top)/r.height*SH,22,438)};};
  svg.addEventListener('mousedown',e=>{const g=e.target.closest('[data-pk]');
    if(g){dragT={k:g.getAttribute('data-pk'),si:parseInt(g.getAttribute('data-slot'))||curSlot};e.preventDefault();}});
  svg.addEventListener('touchstart',e=>{const g=e.target.closest('[data-pk]');
    if(g){dragT={k:g.getAttribute('data-pk'),si:parseInt(g.getAttribute('data-slot'))||curSlot};e.preventDefault();}},{passive:false});
  const mv=e=>{if(!dragT)return;e.preventDefault();const p=gxy(e);
    slots[dragT.si].positions[dragT.k]={x:p.x,y:p.y};renderPlayCourt();};
  window.addEventListener('mousemove',mv);window.addEventListener('touchmove',mv,{passive:false});
  window.addEventListener('mouseup',()=>dragT=null);window.addEventListener('touchend',()=>dragT=null);
  // tap to set landing
  const setLand=p=>{if(dragT)return;if(curSlot<slots.length){slots[curSlot].landX=p.x;slots[curSlot].landY=p.y;renderPlayCourt();renderShotList();updSaveBtn();}};
  svg.addEventListener('click',e=>{if(dragT)return;const g=e.target.closest('[data-pk]');if(g)return;setLand(gxy(e));});
  svg.addEventListener('touchend',e=>{if(dragT)return;const g=e.target.closest('[data-pk]');if(g)return;
    const c=e.changedTouches[0];const r=svg.getBoundingClientRect();
    setLand({x:cl((c.clientX-r.left)/r.width*SW,22,278),y:cl((c.clientY-r.top)/r.height*SH,22,438)});},{passive:true});
}

function renderShotList(){

function buildShotCard(s,i){
  const isCur=i===curSlot;
  const isDone=s.player&&s.shotId&&s.landX!==null;
  const nc=isDone?'done':isCur?'cur':'';
  const shrBtns=PK.map(k=>{
    const sel=s.player===k;
    return`<button class="shr ${sel?'sel':''}"
      style="${sel?`background:${PC[k]};border-color:${PC[k]}`:`border-color:${PC[k]}44;color:#64748b`}"
      onclick="setPlayer(${i},'${k}')">${(db.players[k]||k).slice(0,3)}</button>`;
  }).join('');
  const stBtns=SHOTS.map(sh=>`
    <button class="stb ${s.shotId===sh.id?'sel':''}" onclick="setShotType(${i},'${sh.id}')">${sh.i}${sh.l}</button>`).join('');
  const posHint=s.player?`<div class="phint2">📍 ${db.players[s.player]}トークンをドラッグして打球位置を調整</div>`:'';
  const landOk=s.landX!==null;
  const lh=`<div class="lhint ${landOk?'ok':''}">${landOk?`✓ 着地点設定済み（${s.landY<230?'相手コート':'自チームコート'}側）`:'← コートをタップして着地点を設定'}</div>`;
  const del=slots.length>1?`<button class="sdel" onclick="delSlot(${i})">✕</button>`:'';
  return`<div class="sc ${isCur?'cur':''}" id="sc-${i}">
    <div class="schdr" onclick="setCurSlot(${i})">
      <div class="snum ${nc}">${isDone?'✓':i+1}</div>
      <div class="stitle">ショット${i+1}${isCur?' ✎':''}</div>${del}
    </div>
    <div class="sbody">
      <div class="fl">打球者</div>
      <div class="shr-row">${shrBtns}</div>
      ${posHint}
      <div class="fl">球種</div>
      <div class="strow">${stBtns}</div>
      ${lh}
    </div>
  </div>`;
}
function setCurSlot(i){curSlot=i;renderShotList();renderPlayCourt();}
function setPlayer(i,k){slots[i].player=k;renderShotList();renderPlayCourt();updSaveBtn();}
function setShotType(i,id){slots[i].shotId=id;renderShotList();updSaveBtn();}
function delSlot(i){slots.splice(i,1);if(curSlot>=slots.length)curSlot=slots.length-1;renderShotList();renderPlayCourt();}

  if(!valid.length){toast('ショットを1つ以上完成させてください','err');return;}
  const g=aGame();
  const rally={
    id:'r'+Date.now(),
    result:ph1s.result,
    shots:valid.map(s=>{
      const sh=SHOTS.find(x=>x.id===s.shotId);
      return{player:s.player,playerName:db.players[s.player],
        shotId:s.shotId,shotLabel:sh.l,shotIcon:sh.i,
        positions:JSON.parse(JSON.stringify(s.positions)),
        landX:s.landX,landY:s.landY};
    }),
    time:new Date().toLocaleString('ja-JP'),

  g.rallies.push(rally);saveDB();renderSB();
  toast(ph1s.result==='win'?'✦ 得点ラリー保存！':'✦ 失点ラリー保存','ok');

}

function drawHM(id,rallies,col){
  const cv=document.getElementById(id);if(!cv)return;
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a1a0f';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a5c35';ctx.lineWidth=1;ctx.strokeRect(7,7,W-14,H-14);
  ctx.beginPath();ctx.moveTo(7,H/2);ctx.lineTo(W-7,H/2);ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.stroke();
  if(!rallies.length){ctx.fillStyle='#475569';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('データなし',W/2,H/2+4);return;}
  rallies.forEach(r=>(r.shots||[]).forEach(s=>{
    if(s.positions&&s.player&&s.positions[s.player]){
      const sx=(s.positions[s.player].x/SW)*W,sy=(s.positions[s.player].y/SH)*H;
      const g2=ctx.createRadialGradient(sx,sy,0,sx,sy,14);g2.addColorStop(0,col+'55');g2.addColorStop(1,'transparent');
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fill();
    }
    const lx=(s.landX/SW)*W,ly=(s.landY/SH)*H;
    const g3=ctx.createRadialGradient(lx,ly,0,lx,ly,18);g3.addColorStop(0,col+'88');g3.addColorStop(1,'transparent');
    ctx.fillStyle=g3;ctx.beginPath();ctx.arc(lx,ly,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=col;ctx.globalAlpha=.75;ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }));
}

// Position helpers — each shot stores full positions map
function rpGetPos(shotIdx){
  // Returns positions for all 4 players at the given shot
  if(shotIdx<0||shotIdx>=RP.shots.length)return null;
  return RP.shots[shotIdx].positions||null;
}
function rpGetPosLerp(fromIdx,toIdx,t){
  // Interpolate all 4 player positions between two shots
  const from=fromIdx<0?rpGetPos(0):rpGetPos(fromIdx);
  const to=rpGetPos(toIdx);
  if(!from||!to)return from||to||{};
  const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  const out={};
  PK.forEach(k=>{
    const f=from[k]||{x:150,y:300};const tt=to[k]||{x:150,y:300};
    out[k]={x:f.x+(tt.x-f.x)*ease,y:f.y+(tt.y-f.y)*ease};
  });
  return out;
}

  const g=document.getElementById('rp-tokens');g.innerHTML='';

  PK.forEach(k=>{if(pos[k])rpTok(g,k,pos[k].x,pos[k].y,12,0.4);});
}
function rpTok(parent,key,x,y,r,op=1){
  const col=PC[key];const grp=mkS('g');
  const c=mkS('circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);
  c.setAttribute('fill',col);c.setAttribute('opacity',String(op*0.9));grp.appendChild(c);
  const rim=mkS('circle');rim.setAttribute('cx',x);rim.setAttribute('cy',y);rim.setAttribute('r',r);
  rim.setAttribute('fill','none');rim.setAttribute('stroke','rgba(255,255,255,0.4)');rim.setAttribute('stroke-width','1.5');rim.setAttribute('opacity',String(op));grp.appendChild(rim);
  const t=mkS('text');t.setAttribute('x',x);t.setAttribute('y',y+1);
  t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
  t.setAttribute('font-size','8');t.setAttribute('fill',op>0.5?'#000':'rgba(255,255,255,0.6)');
  t.setAttribute('font-family',"'M PLUS 1p',sans-serif");t.setAttribute('font-weight','800');t.setAttribute('opacity',String(op));
  t.textContent=(db.players[key]||key).slice(0,2);grp.appendChild(t);parent.appendChild(grp);
}
function rpDrawTokensAt(pos,shooterKey){
  const g=document.getElementById('rp-tokens');g.innerHTML='';
  PK.forEach(k=>{
    if(!pos[k])return;
    const isS=k===shooterKey;
    rpTok(g,k,pos[k].x,pos[k].y,isS?15:12,isS?1:0.65);
    if(isS){
      const pulse=mkS('circle');pulse.setAttribute('cx',pos[k].x);pulse.setAttribute('cy',pos[k].y);pulse.setAttribute('r','21');
      pulse.setAttribute('fill','none');pulse.setAttribute('stroke',PC[k]);pulse.setAttribute('stroke-width','1.5');
      pulse.setAttribute('opacity','0.45');pulse.setAttribute('stroke-dasharray','4,2');
      g.insertBefore(pulse,g.firstChild);
    }
  });
}
function rpCtrl(x1,y1,x2,y2){
  const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len,cv=Math.min(len*0.28,50);
  return{cx:mx+nx*cv,cy:my+ny*cv};
}
function rpDrawTrails(upTo){
  const g=document.getElementById('rp-trails');g.innerHTML='';
  for(let i=0;i<upTo;i++){
    const s=RP.shots[i];const col=PC[s.player]||'#94a3b8';
    const pos=s.positions?s.positions[s.player]:{x:150,y:150};
    const {cx,cy}=rpCtrl(pos.x,pos.y,s.landX,s.landY);
    const path=mkS('path');
    path.setAttribute('d',`M${pos.x},${pos.y} Q${cx},${cy} ${s.landX},${s.landY}`);

    path.setAttribute('stroke-opacity','0.25');path.setAttribute('stroke-dasharray','4,3');path.setAttribute('stroke-linecap','round');g.appendChild(path);
    const ld=mkS('circle');ld.setAttribute('cx',s.landX);ld.setAttribute('cy',s.landY);ld.setAttribute('r','5');ld.setAttribute('fill',col);ld.setAttribute('opacity','0.25');g.appendChild(ld);
    const sn=mkS('text');sn.setAttribute('x',s.landX);sn.setAttribute('y',s.landY+1);sn.setAttribute('text-anchor','middle');sn.setAttribute('dominant-baseline','middle');
    sn.setAttribute('font-size','7');sn.setAttribute('fill','#fff');sn.setAttribute('opacity','0.3');sn.setAttribute('font-family','sans-serif');sn.setAttribute('font-weight','700');sn.textContent=i+1;g.appendChild(sn);
  }
}
function rpArcPartial(s,t){
  const col=PC[s.player]||'#94a3b8';
  const pos=s.positions?s.positions[s.player]:{x:150,y:150};
  const {cx,cy}=rpCtrl(pos.x,pos.y,s.landX,s.landY);
  const g=document.getElementById('rp-arc');g.innerHTML='';
  const steps=Math.max(4,Math.round(50*t));const pts=[];
  for(let i=0;i<=steps;i++){const u=(i/steps)*t;
    pts.push([(1-u)*(1-u)*pos.x+2*(1-u)*u*cx+u*u*s.landX,(1-u)*(1-u)*pos.y+2*(1-u)*u*cy+u*u*s.landY]);}
  if(pts.length<2)return{x:pos.x,y:pos.y};
  const d='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join('L');
  const gl=mkS('path');gl.setAttribute('d',d);gl.setAttribute('fill','none');gl.setAttribute('stroke',col);gl.setAttribute('stroke-width','7');gl.setAttribute('stroke-opacity','0.1');gl.setAttribute('stroke-linecap','round');g.appendChild(gl);
  const mp=mkS('path');mp.setAttribute('d',d);mp.setAttribute('fill','none');mp.setAttribute('stroke',col);mp.setAttribute('stroke-width','2.5');mp.setAttribute('stroke-opacity','0.95');mp.setAttribute('stroke-linecap','round');g.appendChild(mp);
  return{x:pts[pts.length-1][0],y:pts[pts.length-1][1]};
}

}
function rpLandMark(s,idx){
  const col=PC[s.player]||'#94a3b8';const g=document.getElementById('rp-marks');
  const gc=mkS('circle');gc.setAttribute('cx',s.landX);gc.setAttribute('cy',s.landY);gc.setAttribute('r','15');gc.setAttribute('fill',col);gc.setAttribute('opacity','0.1');g.appendChild(gc);
  const ring=mkS('circle');ring.setAttribute('cx',s.landX);ring.setAttribute('cy',s.landY);ring.setAttribute('r','9');ring.setAttribute('fill',col+'30');ring.setAttribute('stroke',col);ring.setAttribute('stroke-width','1.8');g.appendChild(ring);
  const sh=SHOTS.find(x=>x.id===s.shotId);
  const t=mkS('text');t.setAttribute('x',s.landX);t.setAttribute('y',s.landY+1);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.setAttribute('font-size','8');t.setAttribute('fill',col);t.setAttribute('font-family','sans-serif');t.setAttribute('font-weight','800');t.textContent=sh?sh.i:(idx+1);g.appendChild(t);
}

// Duration constants
const SDUR=900;  // ms per shot @ ×1
const MOVE_F=0.4; // fraction for player movement
const FLY_F=0.6;  // fraction for shuttle flight

function rpAnimShot(idx){
  if(idx>=RP.shots.length){rpEnd();return;}
  RP.cur=idx;updRPTimeline();
  const s=RP.shots[idx];const col=PC[s.player]||'#94a3b8';
  const dur=SDUR/RP.speed;const t0=performance.now();
  rpDrawTrails(idx);
  // Get prev and current positions
  const prevPos=idx>0?rpGetPos(idx-1):rpGetPos(idx);
  const curPos=rpGetPos(idx);

  function frame(now){
    if(!RP.playing)return;
    const t=Math.min((now-t0)/dur,1);
    const moveFrac=Math.min(t/MOVE_F,1);
    const flightT=t<MOVE_F?0:Math.min((t-MOVE_F)/FLY_F,1);

    // Interpolate ALL 4 player positions
    const ease=moveFrac<0.5?2*moveFrac*moveFrac:1-Math.pow(-2*moveFrac+2,2)/2;
    const interPos={};
    PK.forEach(k=>{
      const p=prevPos?prevPos[k]:{x:150,y:300};
      const c2=curPos?curPos[k]:{x:150,y:300};
      interPos[k]={x:p.x+(c2.x-p.x)*ease,y:p.y+(c2.y-p.y)*ease};
    });
    rpDrawTokensAt(interPos,s.player);

    if(t>=MOVE_F){
      const pos=rpArcPartial(s,flightT);
      rpShuttle(pos.x,pos.y,col);
    } else {
      document.getElementById('rp-shuttle').innerHTML='';
      document.getElementById('rp-arc').innerHTML='';
    }

    const total=RP.shots.length;
    rpSetProg((idx/total+(1/total)*t)*100);
    const sh=SHOTS.find(x=>x.id===s.shotId);
    rpSetStatus(`ショット ${idx+1}/${total}　${db.players[s.player]||s.player} → ${sh?sh.l:'?'}`);

    if(t<1){RP.aid=requestAnimationFrame(frame);}
    else{
      rpLandMark(s,idx);
      document.getElementById('rp-shuttle').innerHTML='';
      // Draw final positions
      rpDrawTokensAt(curPos,s.player);
      setTimeout(()=>{if(RP.playing)rpAnimShot(idx+1);},260/RP.speed);
    }
  }
  RP.aid=requestAnimationFrame(frame);
}
function rpEnd(){RP.playing=false;document.getElementById('rpplaybtn').textContent='↺ 最初から';rpSetStatus(`完了 — ${RP.rally.result==='win'?'✦ 得点！':'✦ 失点'}`);rpSetProg(100);RP.cur=RP.shots.length;updRPTimeline();}
function rpToggle(){
  if(RP.cur>=RP.shots.length){rpReset();return;}
  if(RP.playing){RP.playing=false;cancelAnimationFrame(RP.aid);document.getElementById('rpplaybtn').textContent='▶ 再生';rpSetStatus('⏸ 一時停止');}
  else{RP.playing=true;document.getElementById('rpplaybtn').textContent='⏸ 一時停止';rpAnimShot(Math.max(0,RP.cur));}
}
function rpReset(){cancelAnimationFrame(RP.aid);RP.playing=false;RP.cur=-1;rpClearAll();rpDrawInitTokens();rpSetStatus('▶ 再生ボタンでアニメーション開始');rpSetProg(0);document.getElementById('rpplaybtn').textContent='▶ 再生';updRPTimeline();}
function rpStep(dir){
  cancelAnimationFrame(RP.aid);RP.playing=false;document.getElementById('rpplaybtn').textContent='▶ 再生';
  const next=Math.max(-1,Math.min(RP.shots.length-1,RP.cur+dir));RP.cur=next;
  if(next<0){rpClearAll();rpDrawInitTokens();rpSetStatus('▶ 再生ボタンでアニメーション開始');rpSetProg(0);updRPTimeline();return;}
  rpClearAll();rpDrawTrails(next);
  const pos=rpGetPos(next);if(pos)rpDrawTokensAt(pos,RP.shots[next].player);
  for(let j=0;j<=next;j++)rpLandMark(RP.shots[j],j);
  const s=RP.shots[next];const sh=SHOTS.find(x=>x.id===s.shotId);
  rpSetStatus(`ショット ${next+1}/${RP.shots.length}　${db.players[s.player]||s.player} → ${sh?sh.l:'?'}`);
  rpSetProg(((next+1)/RP.shots.length)*100);updRPTimeline();
}
function rpJump(i){
  cancelAnimationFrame(RP.aid);RP.playing=false;document.getElementById('rpplaybtn').textContent='▶ 再生';RP.cur=i;
  rpClearAll();rpDrawTrails(i);
  const pos=rpGetPos(i);if(pos)rpDrawTokensAt(pos,RP.shots[i].player);
  for(let j=0;j<=i;j++)rpLandMark(RP.shots[j],j);
  const s=RP.shots[i];const sh=SHOTS.find(x=>x.id===s.shotId);
  rpSetStatus(`ショット ${i+1}/${RP.shots.length}　${db.players[s.player]||s.player} → ${sh?sh.l:'?'}`);
  rpSetProg(((i+1)/RP.shots.length)*100);updRPTimeline();
}
function rpSetStatus(m){const el=document.getElementById('rpstatus');if(el)el.textContent=m;}
function rpSetProg(p){const el=document.getElementById('rppfill');if(el)el.style.width=Math.min(100,p)+'%';}

// ════════════════════════════════════════
// PAGE NAV
// ════════════════════════════════════════
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('act'));
  document.querySelectorAll('.hn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('act');
  const idx=['input','stats','log'].indexOf(p);
  if(idx>=0)document.querySelectorAll('.hn')[idx].classList.add('active');
  if(p==='stats')renderStats();
  if(p==='log')renderLog();
}

// ════════════════════════════════════════
// MODAL / TOAST
// ════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
function toast(msg,type='ok'){
  const el=document.getElementById('toast');el.textContent=msg;el.className=`toast t${type} show`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);
}
